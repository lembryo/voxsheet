<head>
    <meta charset="utf-8" />

    <meta
        content="@lembryo/voxsheet — a React spreadsheet / data grid that renders millions of rows smoothly with virtual scrolling. Excel-like editing, autofill, and server-driven sort / filter / search. TypeScript-first, MIT licensed. 仮想スクロール対応の React スプレッドシート。"
        name="description" />
    <meta content="index, follow, max-image-preview:large" name="robots" />

    <link href="https://lembryo.github.io/voxsheet/" rel="canonical" />

    <link href="https://lembryo.github.io/voxsheet/ja/" hreflang="ja" rel="alternate" />

    <meta content="website" property="og:type" />
    <meta content="@lembryo/voxsheet" property="og:site_name" />
    <meta content="voxsheet — Virtual-scrolling React spreadsheet &amp; data grid" property="og:title" />
    <meta
        content="Render millions of rows smoothly in React. Excel-like editing, autofill, and server-driven sort / filter / search. TypeScript-first, MIT licensed."

    <link href="./favicon.png" rel="icon" type="image/png" />
    <script>
        // 言語を選んで /ja または /en へ振り分ける。
        // 1) 以前の選択（localStorage） 2) ブラウザ言語 3) 既定は英語
        (function() {
            var lang;
            try {
                lang = localStorage.getItem('voxsheet-lang');
            } catch (e) {
            }
            if (lang !== 'ja' && lang !== 'en') {
                lang = (navigator.language || '').toLowerCase().indexOf('ja') === 0 ? 'ja' : 'en';
            }
            location.replace(lang === 'ja' ? './ja/' : './en/');
        })();
    </script>
    <meta content="0; url=./en/" http-equiv="refresh" />
</head>
<body>
<p style="font-family:sans-serif;padding:24px">
    Redirecting… / 移動中… &nbsp;
    <a href="./en/">English</a> · <a href="./ja/">日本語</a>
</p>
</body>
