# CI — lint / typecheck / test / build を検証する。
# push (main) と全 PR で実行。
name: CI

on:
    push:
        branches: [ main ]
    pull_request:

jobs:
    verify:
        runs-on: ubuntu-latest
        # 正規リポジトリ以外（fork 等）では実行しない。
        if: github.repository == 'lembryo/voxsheet'
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-node@v4
                with:
                    node-version-file: .nvmrc
            -   run: npm install
            -   run: npm run lint
            -   run: npm run typecheck
            -   run: npm test
            -   run: npm run build
