# CI — lint / typecheck / test / build を検証する。
# このワークフローは packages/voxsheet を独立リポジトリ (lembryo/voxsheet) に切り出した後に有効化される
# （GitHub Actions はリポジトリ root の .github/ のみを読むため、モノレポ内では動作しない）。
name: CI

on:
    push:
        branches: [ main ]
    pull_request:

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-node@v4
                with:
                    node-version-file: .nvmrc
                    cache: npm
            -   run: npm ci
            -   run: npm run lint
            -   run: npm run typecheck
            -   run: npm test
            -   run: npm run build
